<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>sorter — setup</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --color-bg: #0d0d0c;
    --color-surface: #1a1918;
    --color-border: #2a2926;
    --color-text: #f5f4f1;
    --color-text-muted: #9a9890;
    --color-primary: #0055bf;
    --color-primary-hover: #004499;
    --color-success: #00852b;
    --color-danger: #d01012;
  }
  html, body { background: var(--color-bg); color: var(--color-text); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  /* sharp edges everywhere */
  *, *::before, *::after { border-radius: 0; }
  .surface { background: var(--color-surface); border: 1px solid var(--color-border); }
  .control { background: var(--color-surface); color: var(--color-text); border: 1px solid #48433a; min-height: 2.75rem; padding: 0 0.75rem; width: 100%; }
  .control:focus { outline: none; border-color: var(--color-primary); }
  .btn-primary { background: var(--color-primary); color: white; border: 1px solid var(--color-primary); padding: 0.75rem 1rem; width: 100%; font-weight: 600; }
  .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .alert-info { border: 1px solid rgba(154,152,144,0.4); color: var(--color-text); padding: 0.75rem; }
  .alert-success { border: 1px solid rgba(0,133,43,0.4); color: var(--color-success); padding: 0.75rem; }
  .alert-danger { border: 1px solid rgba(208,16,18,0.4); color: var(--color-danger); padding: 0.75rem; }
</style>
</head>
<body class="min-h-screen p-6 max-w-md mx-auto">
  <header class="mb-8">
    <p class="text-xs font-semibold tracking-wider uppercase text-neutral-400">basically</p>
    <h1 class="text-2xl font-semibold mt-1">sorter setup</h1>
    <p class="text-sm text-neutral-400 mt-2">
      Pick a Wi-Fi network for the sorter to join.
    </p>
  </header>

  <section class="space-y-4">
    <div>
      <label for="ssid" class="block text-sm font-medium mb-2">Wi-Fi network</label>
      <select id="ssid" class="control text-sm">
        <option value="">— scanning... —</option>
      </select>
    </div>

    <div>
      <label for="password" class="block text-sm font-medium mb-2">Password</label>
      <input id="password" type="password" autocomplete="off" class="control text-sm" />
    </div>

    <button id="submit" class="btn-primary text-sm">Connect sorter</button>

    <div id="status" class="hidden text-sm"></div>
  </section>

  <footer class="mt-12 text-xs text-neutral-500">
    <p>You can close this page after the sorter joins your network. It'll be reachable at sorter.local.</p>
  </footer>

<script>
async function loadNetworks() {
  try {
    const r = await fetch("/api/networks");
    const nets = await r.json();
    const sel = document.getElementById("ssid");
    sel.innerHTML = '<option value="">— select network —</option>';
    if (nets.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "(no networks found — type SSID manually below)";
      sel.appendChild(opt);
    }
    for (const n of nets) {
      const opt = document.createElement("option");
      opt.value = n.ssid;
      opt.textContent = `${n.ssid}  (${n.signal}%)`;
      sel.appendChild(opt);
    }
  } catch (e) {
    setStatus("danger", "Failed to scan: " + e.message);
  }
}

function setStatus(kind, msg) {
  const el = document.getElementById("status");
  el.className = "text-sm alert-" + kind;
  el.textContent = msg;
  el.classList.remove("hidden");
}

document.getElementById("submit").addEventListener("click", async () => {
  const ssid = document.getElementById("ssid").value;
  const password = document.getElementById("password").value;
  if (!ssid) { setStatus("danger", "Pick a network."); return; }
  setStatus("info", "Connecting...");
  document.getElementById("submit").disabled = true;
  try {
    const r = await fetch("/api/connect", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ssid, password})
    });
    const data = await r.json();
    if (data.ok) {
      setStatus("success", "Sorter is joining " + ssid + ". You can close this page in ~30 seconds.");
    } else {
      setStatus("danger", "Failed: " + (data.error || "unknown error"));
      document.getElementById("submit").disabled = false;
    }
  } catch (e) {
    setStatus("danger", "Network error: " + e.message);
    document.getElementById("submit").disabled = false;
  }
});

loadNetworks();
</script>
</body>
</html>
